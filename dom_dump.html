mbre legal aquí.","dsa_illegal_confirm_accuracy":"Confirmo mi convencimiento de que el contenido de esta denuncia es cierto, preciso y completo.","idpa_attachment":"Archivos adjuntos","idpa_attachment_instruction":"El titular de los derechos cuyos derechos fueron infringidos, o un representante autorizado, debe presentar el informe. Revisa atentamente las \u003CredLink\u003Enormas de presentación\u003C\u002FredLink\u003E y envía toda la documentación requerida. Los formatos de archivo deben ser JPEG, JPG o PNG, y deben pesar menos de 20 MB.","idpa_attachment_sec1":"Sección 1:","idpa_identification_document_title":"Documentos sobre el demandante","idpa_identification_document_instruction_IP":"Presenta documentos oficiales de identidad. Por ejemplo: permiso de conducir (anverso y reverso), pasaporte (página de la foto y página con el nombre del titular y los datos de contacto en caso de emergencia), tarjeta My Number Card (solo anverso), etc. Además, si es necesario, debes presentar documentos que demuestren la autoridad de la agencia, documentos que demuestren el consentimiento de un representante legal, como un tutor, y documentos que indiquen que la solicitud corresponde a la persona en cuestión. Además, si eres una persona jurídica, debes presentar documentos como el Certificado de Registro Mercantil y el Poder Notarial del representante.\u003CredLink\u003EMás información\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Presenta documentos oficiales de identidad. Por ejemplo: permiso de conducir (anverso y reverso), pasaporte (página de la foto y página con el nombre del titular y los datos de contacto en caso de emergencia), tarjeta My Number Card (solo anverso), etc. Además, si es necesario, debes presentar documentos que demuestren la autoridad de la agencia, documentos que demuestren el consentimiento de un representante legal, como un tutor, y documentos que indiquen que la solicitud corresponde a la persona en cuestión. \u003CredLink\u003EMás información\u003C\u002FredLink\u003E","attachment_upload_limit":"El tamaño de cada archivo debe ser de al menos 20 MB","idpa_attachment_sec2":"Sección 2:","idpa_right_holder_status_title":"Documentación que acredite el estado del titular de los derechos","idpa_ric_proof_title":"Documentación sobre la infracción de derechos","idpa_right_holder_status_instruction_1":"(Infracción de derechos de propiedad intelectual)","idpa_right_holder_status_instruction_2":"Presenta documentos que identifiquen los derechos de propiedad intelectual que crees que se infringieron y documentos que demuestren que eres propietario de la supuesta propiedad intelectual. \u003CredLink\u003EMás información\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Infracción de intereses comerciales)","idpa_right_holder_status_instruction_4":"La documentación requerida varía en función de los intereses comerciales supuestamente infringidos (por ejemplo, documentos que demuestren la reputación o notoriedad de las etiquetas de los productos, documentos que demuestren que la publicación engaña a los consumidores sobre la calidad). Revisa los \u003CredLink\u003Edetalles\u003C\u002FredLink\u003E y envía la documentación adecuada. Puedes cargar hasta tres archivos en formato JPEG, JPG o PNG, cada uno de menos de 20 MB.","idpa_ric_proof_instruction":"Envía una captura de pantalla o una prueba similar que muestre la parte del contenido publicado que crees que infringe tus derechos. Puedes subir hasta tres archivos en formato JPEG, JPG o PNG, cada uno de menos de 20 MB. \u003CredLink\u003EMás información\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Sección 3:","idpa_other_document_title":"Otros documentos justificantes","idpa_other_document_instruction":"Envía cualquier documento justificante, como los que demuestran que el caso no entra dentro de las excepciones a la difamación. Puedes cargar hasta tres archivos en formato JPEG, JPG o PNG, cada uno de menos de 20 MB. \u003Cr cios digitales, los contenidos que suban los usuarios menores de 16 años no se recomendarán. La promoción de la cirugía estética entre los menores puede dar lugar a tasas más elevadas de insatisfacción corporal. En consecuencia, tales contenidos (incluidos los videos del antes y el después, los videos de procedimientos quirúrgicos y los mensajes que hablen de cirugía estética electiva sin advertir de los riesgos) no son aptos para el feed “Para ti” de todos los usuarios menores de 18 años.","vid_mod_analytics_penalty_reason_unoriginal_title":"Contenido de código QR, de baja calidad o no original","vid_mod_analytics_penalty_reason_unoriginal_desc":"Para que TikTok siga siendo positivo y agradable para nuestros usuarios, no se recomendará el contenido no original o de baja calidad. El contenido no original incluye videos simplemente importados o subidos de otras fuentes (como otras plataformas, programas de TV, películas o webcasts) sin ninguna edición nueva y creativa. Podemos saber si un video no es original si tiene una marca de agua o un logotipo superpuesto. Los contenidos de baja calidad incluyen videos muy cortos, imágenes estáticas y videos hechos solo de GIF. Por lo general, tampoco permitimos contenidos con códigos QR en el feed “Para ti” porque pueden guiar a los usuarios a sitios web o aplicaciones perjudiciales, aunque hacemos excepciones en circunstancias en las que el riesgo es bajo (por ejemplo, en caso de comercio electrónico).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Contenido de código QR, de baja calidad o no original","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Para mantener la experiencia positiva que nuestros usuarios esperan de la plataforma TikTok, no se recomendará el contenido no original o de baja calidad. Un contenido no original es aquel que simplemente se importa o copia de otras fuentes sin ninguna edición nueva y creativa. Un video no es original si tiene una marca de agua o un logotipo. El contenido de baja calidad incluye videos muy cortos, imágenes estáticas y videos hechos solo de GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Cuenta no original","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tu cuenta contiene publicaciones que no son originales, por lo que no son aptas para el feed “Para ti”. Para obtener más información, revisa las Normas de la comunidad \u003E No apto para el feed “Para ti” \u003E Contenido de código QR, de baja calidad o no original","vid_mod_analytics_penalty_reason_spam_title":"Contenido falso, engañoso o spam","vid_mod_analytics_penalty_reason_spam_desc":"El contenido que intente engañar o manipular a las personas para conseguir más seguidores, me gusta, vistas u otras métricas de interacción no es apto para el feed “Para ti”. Esto incluye el contenido que anima a los usuarios a seguirse o darse me gusta mutuamente, o el contenido que engaña a los usuarios para que hagan clic en los botones ”Me gusta” o “Compartir”. Además, el contenido que promueva teorías conspiratorias y difunda información falsa o perjudicial sobre acontecimientos actuales que aún se encuentren en desarrollo tampoco es apto para el feed “Para ti”.","vid_mod_analytics_penalty_reason_sexual_title":"Contenido claramente sexualizado","vid_mod_analytics_penalty_reason_sexual_desc":"Para que sigas teniendo una experiencia cómoda, es posible que el contenido sexualmente sugestivo no se incluya en las sugerencias. Esto incluye contenido que muestre desnudez implícita, sexualice partes del cuerpo o sea descaradamente erótico o sensual (por ejemplo, estriptís).","vid_mod_analytics_penalty_reason_tobacco_title":"Productos de tabaco y alcohol","vid_mod_analytics_penalty_reason_tobacco_desc":"El contenido que promueva, mencione o muestre productos alcohólicos consumidos por personas con edad legal para tomar tales sustancias, pero que lo hagan de forma peligrosa, podría excluirse de las sugerencias. El contenido que muestre el uso de productos de tabaco por parte de adultos o que mencione sustancias reguladas no se incluirá en las sugerencias.","vid_mod_analytics_penalty_reason_stunts_title":"Deportes y escenas peligrosas","vid_mod_analytics_penalty_reason_stunts_desc":"Cuando se reproducen sin precauciones de seguridad, ciertas actividades pueden ser arriesgadas o peligrosas, lo que podría provocar daños físicos. Los contenidos que incluyan acrobacias peligrosas, o deportes extremos realizados por no profesionales, pueden no ser aptos para el feed.","vid_mod_analytics_penalty_reason_graphic_title":"Contenido violento y explícito","vid_mod_analytics_penalty_reason_graphic_desc":"El contenido que cause incomodidad, conmoción o aversión a los espectadores podría considerarse no apto para el feed “Para ti”, incluidos los efectos de miedo, los sustos, el maquillaje que recrea de forma realista heridas sangrientas y las representaciones de funciones corporales. La mayor parte del contenido violento y gráfico no está permitida en TikTok. Sin embargo, podríamos permitir ciertos tipos de contenido, tales como imágenes gráficas relacionadas con la muerte, accidentes o peleas cuando sirvan para documentar hechos reales y se considere que son de interés público. Dado que este tipo de contenido podría ser incómodo para algunos espectadores, no se incluirá en las sugerencias y aparecerá una pantalla o advertencia donde elegir si ver o no.","vid_mod_analytics_penalty_reason_fyf_title":"No apto para el feed Para ti","vid_mod_analytics_penalty_reason_fyf_desc":"Tu video no cumple los estándares de aptitud del feed “Para ti”. Para obtener más información, revisa las Normas de la comunidad de TikTok \u003E No apto para el feed “Para ti”","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Las personas que usan nuestra aplicación y terceros pueden enviarnos denuncias sobre las infracciones de las políticas. Detectamos esta infracción de las Normas de la comunidad gracias a una denuncia.","vidModAnalytics_detailPg_secti
